{% extends 'layout.html' %}

{% block title %}
404 - Página no encontrada
{% endblock %}

{% block content %}

<div class="flex items-center justify-center min-h-[70vh]">

    <div class="text-center bg-white shadow-xl rounded-2xl p-12 border border-gray-200 max-w-lg">

        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 flex items-center justify-center rounded-full bg-red-100 text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" 
                     fill="none" 
                     viewBox="0 0 24 24" 
                     stroke-width="1.5" 
                     stroke="currentColor" 
                     class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 9v3.75m0 3h.007M21 12a9 9 0 
                    11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
        </div>

        <h1 class="text-6xl font-bold text-gray-800 mb-4">
            404
        </h1>

        <h2 class="text-2xl font-semibold text-gray-700 mb-2">
            Página no encontrada
        </h2>

        <p class="text-gray-500 mb-6">
            La página que intentas visitar no existe o fue movida.
        </p>

        <a href="/" 
           class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition">
            Volver al inicio
        </a>

    </div>

</div>

{% endblock %}
