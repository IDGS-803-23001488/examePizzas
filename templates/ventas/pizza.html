{% extends 'layout.html' %}

{% block title %}
Agregar Pizza
{% endblock %}

{% block content %}

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Header con estilo mejorado -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-900 relative inline-block">
            Agregar Pizza
        </h2>
        <div class="mt-8 p-4 bg-green-50 rounded-lg border border-green-200">
            <div class="flex items-center gap-2 text-green-800">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span class="text-sm font-medium">Selecciona el tamaño, ingredientes y cantidad para personalizar tu pizza</span>
            </div>
        </div>
    </div>

    <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <!-- Grid responsivo mejorado -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Tarjeta: Tamaño de Pizza -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden">
                <div class="bg-gradient-to-r from-green-600 to-green-500 px-4 py-3">
                    <h3 class="font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        Tamaño de Pizza
                    </h3>
                </div>
                <div class="p-5 space-y-3">
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="radio" name="tamano" value="chica" required class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Chica <span class="text-sm text-gray-500 ml-2">$40</span>
                        </span>
                    </label>
                    
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="radio" name="tamano" value="mediana" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Mediana <span class="text-sm text-gray-500 ml-2">$80</span>
                        </span>
                    </label>
                    
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="radio" name="tamano" value="grande" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Grande <span class="text-sm text-gray-500 ml-2">$120</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- Tarjeta: Ingredientes -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden">
                <div class="bg-gradient-to-r from-green-600 to-green-500 px-4 py-3">
                    <h3 class="font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        Ingredientes
                    </h3>
                </div>
                <div class="p-5 space-y-3">
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="checkbox" name="ingredientes" value="jamon" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 rounded focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Jamón <span class="text-sm text-gray-500 ml-2">+$10</span>
                        </span>
                    </label>
                    
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="checkbox" name="ingredientes" value="piña" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 rounded focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Piña <span class="text-sm text-gray-500 ml-2">+$10</span>
                        </span>
                    </label>
                    
                    <label class="flex items-center p-3 rounded-lg border-2 border-gray-200 hover:border-green-500 cursor-pointer transition-colors duration-200 group">
                        <input type="checkbox" name="ingredientes" value="champinones" class="w-4 h-4 text-green-600 bg-gray-100 border-gray-300 rounded focus:ring-green-500 focus:ring-2">
                        <span class="ml-3 text-gray-700 font-medium group-hover:text-green-600">
                            Champiñones <span class="text-sm text-gray-500 ml-2">+$10</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- Tarjeta: Cantidad y Botón -->
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden">
                <div class="bg-gradient-to-r from-green-600 to-green-500 px-4 py-3">
                    <h3 class="font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path>
                        </svg>
                        Cantidad
                    </h3>
                </div>
                <div class="p-5">
                    <div class="mb-6">
                        <label for="cantidad" class="block text-sm font-medium text-gray-700 mb-2">
                            Número de pizzas
                        </label>
                        <div class="relative">
                            <input 
                                type="number"
                                id="cantidad"
                                name="cantidad"
                                min="1"
                                value="1"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors duration-200"
                                required
                            >
                            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                                <span class="text-gray-500 sm:text-sm">pizzas</span>
                            </div>
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-green-600 to-green-500 text-white py-3 px-4 rounded-lg hover:from-green-700 hover:to-green-600 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transform transition-all duration-200 hover:scale-[1.02] font-medium text-lg shadow-md"
                    >
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                            </svg>
                            Agregar Pizza
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

{% endblock %}
