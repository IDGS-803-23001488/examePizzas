<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pizzería Dashboard{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-green-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <h1 class="font-bold text-3xl tracking-tight hover:text-green-200 transition-colors duration-200">
                        Pizzas al Chile
                    </h1>
                </div>

                <div class="flex space-x-2">
                    <a href="{{ url_for('index') }}" 
                       class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-800 hover:shadow-md transition-all duration-200 flex items-center space-x-1">
                        <svg width="30px" height="30px" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0L0 6V8H1V15H4V10H7V15H15V8H16V6L14 4.5V1H11V2.25L8 0ZM9 10H12V13H9V10Z" fill="#ffffff"></path> </g></svg>
                        <span>Inicio</span>
                    </a>

                    <a href="{{ url_for('ventas.index') }}" 
                       class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-800 hover:shadow-md transition-all duration-200 flex items-center space-x-1">
                        <svg width="30px" height="30px" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M1 16L0 15L1.97837 10.9068C2.14083 10.9671 2.31657 11 2.5 11C3.32843 11 4 10.3284 4 9.5C4 8.95653 3.71097 8.48056 3.27824 8.21743L5.37251 3.88446C8.37131 5.21622 10.7838 7.62869 12.1155 10.6275L9.97183 11.6636C9.81188 10.7192 8.98993 10 8 10C6.89543 10 6 10.8954 6 12C6 12.5135 6.19355 12.9819 6.51167 13.336L1 16Z" fill="#ffffff"></path> <path d="M6.24346 2.0825C9.6471 3.61175 12.3883 6.3529 13.9175 9.75654L15.9445 8.77684C14.1934 4.91762 11.0824 1.80661 7.22316 0.0555267L6.24346 2.0825Z" fill="#ffffff"></path> </g></svg>
                        <span>Nuevo Pedido</span>
                    </a>

                       class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-800 hover:shadow-md transition-all duration-200 flex items-center space-x-1">

                       <span>Ventas del dia</span>
                    </a>

                    <a href="{{ url_for('consultas.historico', tipo='dia', valor='lunes') }}"
                       class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-800 hover:shadow-md transition-all duration-200 flex items-center space-x-1">
                        <svg width="30px" height="30px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M1 5C1 3.34315 2.34315 2 4 2H8.43845C9.81505 2 11.015 2.93689 11.3489 4.27239L11.7808 6H13.5H20C21.6569 6 23 7.34315 23 9V11C23 11.5523 22.5523 12 22 12C21.4477 12 21 11.5523 21 11V9C21 8.44772 20.5523 8 20 8H13.5H11.7808H4C3.44772 8 3 8.44772 3 9V10V19C3 19.5523 3.44772 20 4 20H9C9.55228 20 10 20.4477 10 21C10 21.5523 9.55228 22 9 22H4C2.34315 22 1 20.6569 1 19V10V9V5ZM3 6.17071C3.31278 6.06015 3.64936 6 4 6H9.71922L9.40859 4.75746C9.2973 4.3123 8.89732 4 8.43845 4H4C3.44772 4 3 4.44772 3 5V6.17071ZM20.1716 18.7574C20.6951 17.967 21 17.0191 21 16C21 13.2386 18.7614 11 16 11C13.2386 11 11 13.2386 11 16C11 18.7614 13.2386 21 16 21C17.0191 21 17.967 20.6951 18.7574 20.1716L21.2929 22.7071C21.6834 23.0976 22.3166 23.0976 22.7071 22.7071C23.0976 22.3166 23.0976 21.6834 22.7071 21.2929L20.1716 18.7574ZM13 16C13 14.3431 14.3431 13 16 13C17.6569 13 19 14.3431 19 16C19 17.6569 17.6569 19 16 19C14.3431 19 13 17.6569 13 16Z" fill="#ffffff"></path> </g></svg>
                        <span>Consultas</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto mt-6 px-4 sm:px-6 lg:px-8">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="bg-green-100 border-l-4 border-green-700 text-green-800 p-4 rounded-lg shadow-md mb-4 flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="text-green-700 text-xl">✓</span>
                            <span class="font-medium">{{ msg }}</span>
                        </div>
                        <button onclick="this.parentElement.remove()" class="text-green-600 hover:text-green-800 transition-colors">
                            <span class="text-xl">×</span>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-xl shadow-md p-6">
            {% block content %}
            {% endblock %}
        </div>
    </main>
</body>
</html>
